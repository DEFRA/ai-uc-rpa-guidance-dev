include:
  - ./service-compose/ai-uc-rpa-guidance.yaml
  - ./service-compose/ai-uc-rpa-guidance-fe.yaml
  - ./dependencies/cdp-uploader.yaml
services:
  floci:
    image: floci/floci@sha256:b604da97e8c481c407f8e8d3300a8317d68058ac757dfa2af15fd6c4e9d25c59 # 1.5.19-compat
    ports:
      - '4566:4566'
    env_file:
      - '.env'
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_STORAGE_PERSISTENT_PATH: ./data
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
      - floci-data:/app/data
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - "curl -s localhost:4566 && cat /tmp/READY"
      interval: 5s
      start_period: 30s
      retries: 15
    networks:
      - ai-uc-rpa-guidance
      - cdpuploader
  mongodb:
    image: mongo@sha256:4510cf3d7050003e958745adb25d2deb3fb907430716162d9cc1a92eda2a6047 # 7.0.28
    networks:
      - ai-uc-rpa-guidance
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data
  redis:
    image: redis@sha256:3ce533b2b057f74b235d1d8697ae08b1b6ff0a5e16827ea6a377b6365693c7ed # 7.2.3-alpine3.18
    ports:
      - 6379:6379
    networks:
      - ai-uc-rpa-guidance
      - cdpuploader
volumes:
  floci-data:
  mongodb-data:
networks:
  ai-uc-rpa-guidance:
    name: ai-uc-rpa-guidance
    driver: bridge
  cdpuploader:
    driver: bridge
