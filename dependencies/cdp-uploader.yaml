services:
  proxy:
    image: nginxproxy/nginx-proxy@sha256:6a0068e5169364d3859b35037fd879324648082d8348da43e51b7abd86fdd5b1
    ports:
      - '7300:80'
    environment:
      - ENABLE_IPV6=true
      - DEFAULT_ROOT="418"
      - DEFAULT_HOST=~^uploader\..*\.sslip\.io
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - cdpuploader

  cdp-uploader:
    image: defradigital/cdp-uploader@sha256:eb1627b60690ec24d41a17ed82e80c28d009aaaeb19dc179c6a3887da7e6a5bd
    ports:
      - '7337:7337'
    links:
      - 'floci:floci'
      - 'redis:redis'
    depends_on:
      floci:
        condition: service_healthy
    environment:
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      VIRTUAL_HOST: ~^uploader\..*\.sslip\.io
      VIRTUAL_PATH: /
      VIRTUAL_PORT: 7337
      PORT: 7337
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      MOCK_VIRUS_SCAN_ENABLED: true
      MOCK_VIRUS_RESULT_DELAY: 3
      SQS_ENDPOINT: http://floci:4566
      S3_ENDPOINT: http://floci:4566
      APP_BASE_URL: http://localhost:7337
    networks:
      - cdpuploader
