services:
  ai-uc-rpa-guidance-evals-fe:
    build:
      target: development
      context: ../repos/ai-uc-rpa-guidance-evals-fe
    ports:
      - '3001:3001'
    links:
      - "floci:floci"
      - 'redis:redis'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      floci:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - "../.env"
    volumes:
      - ../repos/ai-uc-rpa-guidance-evals-fe/src/:/home/node/src
      - ../repos/ai-uc-rpa-guidance-evals-fe/package.json:/home/node/package.json
      - ../repos/ai-uc-rpa-guidance-evals-fe/data:/home/node/data:ro
    environment:
      PORT: 3001
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      EVALS_API_URL: http://ai-uc-rpa-guidance-evals-runtime:8285
    networks:
      - ai-uc-rpa-guidance
